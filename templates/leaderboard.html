{% extends "layout.html" %}

{% block title %}Leaderboard{% endblock %}

{% block content %}
<section class="leaderboard-page">
    <div class="page-heading">
        <div>
            <h1 class="eyebrow">Leaderboard</h1>
            <h3>Top students by course assessment scores.</h3>
            <p>Rankings use each student's best attempt per task. Late submissions show the 10% penalty in score pages.</p>
        </div>
    </div>

    <div class="filter-row">
        <label for="course-filter">Filter by course:</label>
        <select id="course-filter" aria-label="Course filter">
            <option value="overall">Overall</option>
            <option value="CS2102">Database Systems</option>
            <option value="CS1010">Introduction to Programming</option>
            <option value="CS1231">Computing Maths</option>
        </select>
    </div>

    <section class="panel">
        <div class="panel-heading">
            <h2>Top students</h2>
        </div>
        <div class="leader-list" id="student-leader-list"></div>
    </section>
</section>

<script type="application/json" id="leaderboard-data">
{
    "overall": [
        {"rank": 1, "username": "student04", "coursesJoined": 3, "tasksCompleted": 12, "assessmentsCompleted": 6, "average": 98},
        {"rank": 2, "username": "student01", "coursesJoined": 2, "tasksCompleted": 8, "assessmentsCompleted": 4, "average": 92},
        {"rank": 3, "username": "student08", "coursesJoined": 2, "tasksCompleted": 7, "assessmentsCompleted": 3, "average": 88},
        {"rank": 4, "username": "student03", "coursesJoined": 1, "tasksCompleted": 4, "assessmentsCompleted": 2, "average": 84},
        {"rank": 5, "username": "student11", "coursesJoined": 1, "tasksCompleted": 3, "assessmentsCompleted": 1, "average": 81}
    ],
    "CS2102": [
        {"rank": 1, "username": "student04", "coursesJoined": 3, "tasksCompleted": 4, "assessmentsCompleted": 2, "average": 98},
        {"rank": 2, "username": "student01", "coursesJoined": 2, "tasksCompleted": 4, "assessmentsCompleted": 2, "average": 92},
        {"rank": 3, "username": "student11", "coursesJoined": 1, "tasksCompleted": 3, "assessmentsCompleted": 1, "average": 81}
    ],
    "CS1010": [
        {"rank": 1, "username": "student08", "coursesJoined": 2, "tasksCompleted": 4, "assessmentsCompleted": 2, "average": 88},
        {"rank": 2, "username": "student06", "coursesJoined": 2, "tasksCompleted": 3, "assessmentsCompleted": 1, "average": 83},
        {"rank": 3, "username": "student12", "coursesJoined": 1, "tasksCompleted": 2, "assessmentsCompleted": 1, "average": 77}
    ],
    "CS1231": [
        {"rank": 1, "username": "student03", "coursesJoined": 1, "tasksCompleted": 4, "assessmentsCompleted": 2, "average": 84},
        {"rank": 2, "username": "student09", "coursesJoined": 2, "tasksCompleted": 3, "assessmentsCompleted": 1, "average": 79},
        {"rank": 3, "username": "student05", "coursesJoined": 1, "tasksCompleted": 2, "assessmentsCompleted": 1, "average": 72}
    ]
}
</script>

<script>
    const leaderboardData = JSON.parse(document.getElementById("leaderboard-data").textContent);
    const filter = document.getElementById("course-filter");
    const studentLeaderList = document.getElementById("student-leader-list");

    function renderLeaderboard(courseId) {
        studentLeaderList.innerHTML = "";
        leaderboardData[courseId].forEach((student) => {
            const item = document.createElement("article");
            item.className = "leader-row";
            item.innerHTML = `
                <div class="leader-left">
                    <span class="leader-rank">${student.rank}</span>
                    <div>
                        <h3>${student.username}</h3>
                        <p>${student.coursesJoined} courses joined · ${student.tasksCompleted} tasks completed · ${student.assessmentsCompleted} assessments completed</p>
                    </div>
                </div>
                <span class="badge leader-score">${student.average}% average</span>
            `;
            studentLeaderList.appendChild(item);
        });
    }

    filter.addEventListener("change", () => renderLeaderboard(filter.value));
    renderLeaderboard(filter.value);
</script>
{% endblock %}
