{% extends "layout.html" %}

{% block title %}Leaderboard{% endblock %}

{% block content %}
<section class="leaderboard-page">
    <div class="page-heading">
        <div>
            <h1 class="eyebrow">Leaderboard</h1>
            <h3>Top 5 students and top 5 groups by assessment scores.</h3>
            <p>Each assessment grade contributes to personal ranking and the student's group average.</p>
        </div>
    </div>

    <div class="filter-row">
        <label for="assessment-filter">Filter by assessment:</label>    
        <select id="assessment-filter" aria-label="Assessment filter">
            <option value="overall">Overall</option>
            <option value="A01">A01 - Book exchange joins</option>
            <option value="A02">A02 - Aggregation practice</option>
        </select>
    </div>
    

    <div class="leaderboard-layout">
        <section class="panel">
            <div class="panel-heading">
                <h2>Top students</h2>
            </div>
            <div class="leader-list" id="student-leader-list"></div>
        </section>

        <section class="panel">
            <div class="panel-heading">
                <h2>Top groups</h2>
            </div>
            <div class="leader-list" id="group-leader-list"></div>
        </section>
    </div>
</section>

<script>
    const leaderboardData = JSON.parse(document.getElementById("leaderboard-data").textContent);
    const filter = document.getElementById("assessment-filter");
    const studentLeaderList = document.getElementById("student-leader-list");
    const groupLeaderList = document.getElementById("group-leader-list");

    function renderLeaderboard(assessmentId) {
        studentLeaderList.innerHTML = "";
        groupLeaderList.innerHTML = "";

        leaderboardData.students[assessmentId].forEach((student) => {
            const item = document.createElement("article");
            item.className = "leader-row";
            item.innerHTML = `
                <span class="leader-rank">${student.rank}</span>
                <div>
                    <h3>${student.username}</h3>
                    <p>${student.group} · assessment grades counted</p>
                </div>
                <span class="badge">${student.average}% average</span>
            `;
            studentLeaderList.appendChild(item);
        });

        leaderboardData.groups[assessmentId].forEach((group) => {
            const item = document.createElement("article");
            item.className = "leader-row group-leader-row";
            item.innerHTML = `
                <span class="leader-rank">${group.rank}</span>
                <div>
                    <h3>${group.group}</h3>
                    <p>${group.students.join(", ")}</p>
                </div>
                <span class="badge">${group.average}% average</span>
            `;
            groupLeaderList.appendChild(item);
        });
    }

    filter.addEventListener("change", () => renderLeaderboard(filter.value));
    renderLeaderboard(filter.value);
</script>
{% endblock %}
